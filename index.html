<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanx IA | Abrindo WhatsApp</title>
  <meta name="description" content="Página de redirecionamento para o WhatsApp da Advanx IA.">
  <meta name="robots" content="noindex,nofollow">

  <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init','4361448937281110');

  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=4361448937281110&ev=PageView&noscript=1" alt=""></noscript>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QKZGV7YN84"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-QKZGV7YN84');
  </script>

  <style>
    :root{
      --bg:#0b0d12;
      --card:#151922;
      --text:#f8fafc;
      --muted:#a1aab8;
      --brand:#ff7a01;
      --wa:#25D366;
      --wa-dark:#1faa52;
      --line:rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top, rgba(255,122,1,.18), transparent 32%), var(--bg);
    }
    .card{
      width:min(100%, 460px);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:24px;
      padding:32px 24px;
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      text-align:center;
    }
    .brand{
      margin-bottom:18px;
      font-size:12px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .brand strong{color:var(--brand)}
    .icon{
      width:72px;
      height:72px;
      margin:0 auto 18px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(37,211,102,.12);
      border:1px solid rgba(37,211,102,.25);
      box-shadow:0 0 0 10px rgba(37,211,102,.05);
      font-size:34px;
    }
    h1{
      margin:0 0 10px;
      font-size:28px;
      line-height:1.15;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
    }
    .status{
      margin-top:18px;
      font-size:14px;
      color:#d7dce4;
    }
    .loader{
      width:18px;
      height:18px;
      margin-right:8px;
      display:inline-block;
      vertical-align:-3px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.15);
      border-top-color:var(--brand);
      animation:spin .85s linear infinite;
    }
    .actions{
      margin-top:24px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .btn{
      display:inline-block;
      border:none;
      border-radius:14px;
      padding:15px 18px;
      text-decoration:none;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, background .15s ease;
    }
    .btn:active{transform:scale(.98)}
    .btn-wa{background:var(--wa);color:#fff}
    .btn-wa:hover{background:var(--wa-dark)}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand"><strong>Advanx</strong> IA</div>
    <div class="icon">💬</div>
    <h1>Estamos abrindo o WhatsApp</h1>
    <p>Se não abrir automaticamente em alguns segundos, toque no botão abaixo.</p>
    <div class="status" id="status"><span class="loader"></span>Preparando redirecionamento…</div>
    <div class="actions">
      <a class="btn btn-wa" id="openNow" href="#" target="_self" rel="noopener">Abrir WhatsApp agora</a>
    </div>
  </main>

  <script>
    const WA_NUMBER = '5571982470873';
    const DEFAULT_MESSAGE = 'Oi Rafael, tudo certo por ai?';
    const REDIRECT_DELAY_MS = 1100;
    const params = new URLSearchParams(window.location.search);
    const utmKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
    const clickKeys = ['fbclid','gclid','ttclid','msclkid'];
    const trackingPayload = {
      whatsapp_number: WA_NUMBER,
      page_path: window.location.pathname,
      page_host: window.location.hostname,
      page_url: window.location.href
    };

    for (const key of [...utmKeys, ...clickKeys]) {
      const value = params.get(key);
      if (value) trackingPayload[key] = value;
    }

    try {
      localStorage.setItem('advanx_ia_last_wpp_redirect', JSON.stringify({
        ...trackingPayload,
        saved_at: new Date().toISOString()
      }));
    } catch (_) {}

    const waText = params.get('text') || DEFAULT_MESSAGE;
    const waWebUrl = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waText)}`;
    const waAppUrl = `whatsapp://send?phone=${WA_NUMBER}&text=${encodeURIComponent(waText)}`;

    const statusEl = document.getElementById('status');
    const openNowEl = document.getElementById('openNow');
    openNowEl.href = waWebUrl;

    function trackMetaCustom(eventName, payload){
      try { if (typeof fbq === 'function') fbq('trackCustom', eventName, payload || {}); } catch (_) {}
    }

    function trackMetaStandard(eventName, payload){
      try { if (typeof fbq === 'function') fbq('track', eventName, payload || {}); } catch (_) {}
    }

    function trackGoogle(eventName, payload){
      try { if (typeof gtag === 'function') gtag('event', eventName, payload || {}); } catch (_) {}
    }

    trackMetaCustom('WhatsAppRedirectPageView', trackingPayload);
    trackGoogle('view_content', trackingPayload);
    trackGoogle('whatsapp_redirect_page_view', trackingPayload);

    let redirected = false;
    function redirectToWhatsApp(trigger){
      if (redirected) return;
      redirected = true;
      const payload = {...trackingPayload, trigger};

      trackMetaStandard('Contact', payload);
      trackMetaCustom('WhatsAppClick', payload);
      trackGoogle('generate_lead', payload);
      trackGoogle('whatsapp_click', payload);

      statusEl.textContent = 'Abrindo o WhatsApp… Se não abrir, toque no botão verde abaixo.';
      window.location.href = waAppUrl;
      setTimeout(() => {
        window.location.href = waWebUrl;
      }, 700);
    }

    openNowEl.addEventListener('click', function(){
      redirectToWhatsApp('manual_button');
    });

    window.setTimeout(() => {
      redirectToWhatsApp('auto_redirect');
    }, REDIRECT_DELAY_MS);
  </script>
</body>
</html>
